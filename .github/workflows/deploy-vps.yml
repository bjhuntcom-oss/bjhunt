name: Deploy BJHUNT VPS

on:
  push:
    branches: [main]
    paths:
      - 'engine/**'
      - 'ops/**'
      - 'docker-compose.yml'

  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 443 82.25.117.79 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy
        run: |
          ssh -p 443 -o StrictHostKeyChecking=no root@82.25.117.79 << 'DEPLOY'
            set -euo pipefail
            cd /opt/bjhunt

            # Pull latest
            git -C app pull origin main || git clone https://github.com/bjhuntcom-oss/bjhunt.git app

            # Rebuild and restart
            cd /opt/bjhunt/stack
            docker compose pull
            docker compose up -d --build --force-recreate

            # Health check
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3001/api/health/live > /dev/null 2>&1; then
                echo "Deploy OK"
                exit 0
              fi
              sleep 3
            done
            echo "Health check failed"
            exit 1
          DEPLOY

      - name: Verify production
        run: |
          curl -sf https://api.bjhunt.com/api/health/live || echo "Warning: production health check failed"
