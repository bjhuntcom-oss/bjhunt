name: Deploy BJHUNT VPS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'engine/**'
      - 'ops/**'
      - 'docker-compose.yml'

  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 82.25.117.79 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes root@82.25.117.79 'set -e
            cd /opt/bjhunt/app
            git pull origin main
            docker compose up -d --build backend
            docker compose restart langgraph
            sleep 5
            curl -sf http://localhost:3001/api/health/live > /dev/null && echo "Backend healthy" || echo "Backend not ready"
            echo "Deploy complete"
          '

      - name: Verify production
        run: |
          sleep 5
          curl -sf https://api.bjhunt.com/api/health/live && echo " OK"
          curl -sf https://api.bjhunt.com/api/health/version
