name: Deploy BJHUNT VPS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'engine/**'
      - 'ops/**'
      - 'docker-compose.yml'

  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan 82.25.117.79 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no root@82.25.117.79 << 'DEPLOY'
            set -euo pipefail
            cd /opt/bjhunt/app

            # Pull latest code
            git pull origin main

            # Rebuild and restart changed services
            docker compose up -d --build backend langgraph

            # Wait for health
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3001/api/health/live > /dev/null 2>&1; then
                echo "Backend healthy"
                break
              fi
              sleep 3
            done

            echo "Deploy complete at $(date -u)"
          DEPLOY

      - name: Verify production
        run: |
          sleep 5
          curl -sf https://api.bjhunt.com/api/health/live
          echo ""
          curl -sf https://api.bjhunt.com/api/health/version
