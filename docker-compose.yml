# BJHUNT ALPHA 1.0 — Production Docker Compose
# Assembles: backend API + engine (LangGraph) + databases + sandbox
# Usage: docker compose up -d

services:
  # ── Backend API (Hono + Bun) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bjhunt-backend
    ports:
      - "127.0.0.1:3001:3001"
    env_file: .env
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DATABASE_URL=postgresql://bjhunt:${POSTGRES_PASSWORD:?required}@postgres:5432/bjhunt
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=${SESSION_SECRET:?required}
      - BJHUNT_API_SECRET=${BJHUNT_API_SECRET:?required}
      # AES-256-GCM key for at-rest encryption of provider keys (admin/gateway).
      # Without this the crypto module falls back to a key derived from
      # SESSION_SECRET — works but degrades crypto guarantee.
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?required}
      # BJHUNT_APP_DATABASE_URL is read directly by db/client.ts when set —
      # switches the appSql pool to the bjhunt_app role (NOSUPERUSER, NOBYPASSRLS).
      # If unset, appSql falls back to DATABASE_URL (superuser, bypasses RLS).
      - BJHUNT_APP_DATABASE_URL=${BJHUNT_APP_DATABASE_URL:-}
      - LANGGRAPH_URL=http://langgraph:2024
      - CORS_ORIGINS=${CORS_ORIGINS:-https://bjhunt.com,https://www.bjhunt.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 1g
    cpus: 0.5
    pids_limit: 128
    networks:
      - bjhunt-mgmt
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3001/api/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── PostgreSQL (app data + LiteLLM) ────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: bjhunt-postgres
    environment:
      POSTGRES_DB: bjhunt
      POSTGRES_USER: bjhunt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    # VPS-P1-4: tune for the 32 GB / 8 vCPU host. Defaults
    # (shared_buffers=128MB, work_mem=4MB, effective_cache_size=4GB) leave
    # 95% of the host RAM unused. With mem_limit=2g we let Postgres use
    # ~50% of its cap for shared_buffers and tell the planner the kernel
    # cache is generous (effective_cache_size doesn't actually allocate).
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=4GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "max_connections=200"
    mem_limit: 2g
    cpus: 1.0
    pids_limit: 256
    networks:
      - bjhunt-mgmt
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bjhunt -d bjhunt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bjhunt-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    mem_limit: 1g
    cpus: 0.25
    pids_limit: 64
    networks:
      - bjhunt-mgmt
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── LiteLLM init (one-shot ALTER TABLE safety net) ────────────────
  # VPS-P0-1 follow-up: ensures columns the embedded litellm code
  # expects exist on every boot, even if its own prisma migrate flow
  # thinks the schema is "in sync" when it isn't. Idempotent (IF NOT
  # EXISTS). Container exits 0 once ALTERs apply; litellm depends on
  # service_completed_successfully.
  litellm-init:
    image: postgres:17-alpine
    container_name: bjhunt-litellm-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?required}
    networks:
      - bjhunt-mgmt
    entrypoint: ["sh", "-c"]
    command:
      - |
        psql -h postgres -U bjhunt -d litellm <<'SQL'
        DO $$$$ BEGIN
          IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'LiteLLM_MCPServerTable') THEN
            ALTER TABLE "LiteLLM_MCPServerTable" ADD COLUMN IF NOT EXISTS source_url      TEXT;
            ALTER TABLE "LiteLLM_MCPServerTable" ADD COLUMN IF NOT EXISTS approval_status TEXT NOT NULL DEFAULT 'approved';
            ALTER TABLE "LiteLLM_MCPServerTable" ADD COLUMN IF NOT EXISTS submitted_by    TEXT;
            ALTER TABLE "LiteLLM_MCPServerTable" ADD COLUMN IF NOT EXISTS submitted_at    TIMESTAMP(3);
            ALTER TABLE "LiteLLM_MCPServerTable" ADD COLUMN IF NOT EXISTS reviewed_at     TIMESTAMP(3);
            ALTER TABLE "LiteLLM_MCPServerTable" ADD COLUMN IF NOT EXISTS review_notes    TEXT;
          END IF;
        END $$$$;
        SQL
    restart: "no"

  # ── LiteLLM Proxy ──────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-v1.82.3-stable.patch.2
    container_name: bjhunt-litellm
    volumes:
      - ./engine/config/litellm.yaml:/app/config.yaml:ro
    # VPS-P0-1 follow-up: prisma db push alone wasn't reliably adding new
    # columns (the embedded migrations table thinks the schema is in
    # sync even when the table is missing source_url et al). The
    # litellm-init service below runs a psql ALTER … IF NOT EXISTS
    # safety-net before this container starts.
    entrypoint: ["sh", "-c"]
    command:
      - >-
        prisma db push --schema=/app/litellm/proxy/schema.prisma
        --accept-data-loss --skip-generate
        && litellm --config /app/config.yaml --port 4000
    ports:
      - "127.0.0.1:4000:4000"
    env_file: .env
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:?required}
      - LITELLM_SALT_KEY=${LITELLM_SALT_KEY:?required}
      - DATABASE_URL=postgresql://bjhunt:${POSTGRES_PASSWORD}@postgres:5432/litellm
    depends_on:
      postgres:
        condition: service_healthy
      litellm-init:
        condition: service_completed_successfully
    # VPS-P2-5: bumped 1g→2g, audit found steady-state RAM at 56% of
    # 1g cap (~580 MB) which is uncomfortably close to OOM-kill once
    # MCP server polling and prisma migrate concurrently warm caches.
    mem_limit: 2g
    cpus: 0.5
    pids_limit: 128
    networks:
      - bjhunt-mgmt
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness')"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # ── Neo4j (Attack Chain Graph) ─────────────────────────────────────
  neo4j:
    image: neo4j:5.24-community
    container_name: bjhunt-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?required}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.merge.*,apoc.create.*,apoc.path.*,apoc.algo.*"
      NEO4J_apoc_export_file_enabled: "false"
      NEO4J_apoc_import_file_enabled: "false"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    networks:
      - bjhunt-sandbox-net
      - bjhunt-mgmt
    restart: unless-stopped
    # VPS-P2-3: cap memory so a Neo4j leak cannot OOM the host. Heap is
    # already capped at 2G + pagecache 1G; 4g leaves headroom for native
    # memory and APOC procedures while keeping the container bounded.
    mem_limit: 4g
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Kali Sandbox ───────────────────────────────────────────────────
  sandbox:
    image: ghcr.io/bjhuntcom-oss/bjhunt-sandbox:${BJHUNT_VERSION:-latest}
    build:
      context: ./engine
      dockerfile: containers/sandbox.Dockerfile
    container_name: bjhunt-sandbox
    networks:
      - bjhunt-sandbox-net
    # VPS-P0-2: drop every cap by default, restore only what nmap raw
    # SYN scans + bound ports < 1024 actually need. NET_ADMIN was
    # previously granted but is rarely required for the agents' tool
    # set (would only matter for iptables / netns manipulation, neither
    # in the current playbooks). If a future agent needs it we can
    # re-add it here; for now removing it shrinks the escape surface.
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW           # nmap -sS / SYN scans
      - NET_BIND_SERVICE  # bind privileged ports for service emulation
    security_opt:
      - "no-new-privileges:true"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    volumes:
      - workspace_data:/workspace
    mem_limit: 4g
    cpus: 2.0
    pids_limit: 1024
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  # ── LangGraph (Agent API) ──────────────────────────────────────────
  langgraph:
    image: ghcr.io/bjhuntcom-oss/bjhunt-langgraph:${BJHUNT_VERSION:-latest}
    build:
      context: ./engine
      dockerfile: containers/langgraph.Dockerfile
    container_name: bjhunt-langgraph
    ports:
      - "127.0.0.1:2024:2024"
    env_file: .env
    # VPS-P0-3 — Docker access via tecnativa/docker-socket-proxy
    # (see service `docker-proxy` below). LangGraph no longer mounts the
    # raw socket; instead it talks to a hardened proxy on the management
    # network that exposes only CONTAINERS + EXEC + POST endpoints.
    # An RCE inside LangGraph can now docker-exec into bjhunt-sandbox
    # but NOT create new privileged containers, mount host paths,
    # change the daemon config, etc. — the previous escape-to-host path.
    environment:
      - BJHUNT_LLM__PROXY_URL=http://litellm:4000
      - BJHUNT_LLM__PROXY_API_KEY=${LITELLM_MASTER_KEY}
      - BJHUNT_DOCKER__SANDBOX_CONTAINER_NAME=bjhunt-sandbox
      - BJHUNT_NEO4J_URI=bolt://neo4j:7687
      - BJHUNT_NEO4J_USER=neo4j
      - BJHUNT_NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - BJHUNT_API_SECRET=${BJHUNT_API_SECRET}
      - DOCKER_HOST=tcp://docker-proxy:2375
    depends_on:
      docker-proxy:
        condition: service_started
      litellm:
        condition: service_healthy
      sandbox:
        condition: service_started
      neo4j:
        condition: service_healthy
    mem_limit: 2g
    cpus: 1.0
    pids_limit: 256
    networks:
      - bjhunt-mgmt
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2024/ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Docker Socket Proxy (VPS-P0-3) ────────────────────────────────
  # Hardened proxy in front of /var/run/docker.sock so LangGraph can
  # docker-exec into bjhunt-sandbox without holding the keys to the
  # host. Permissions matrix: allow CONTAINERS list/inspect + EXEC +
  # POST writes (needed for `docker exec` and `docker cp`). Everything
  # else (IMAGES, NETWORKS, VOLUMES, BUILD, SYSTEM, AUTH, etc.) stays
  # forbidden — a compromised LangGraph cannot create new containers,
  # mount host paths, or pull images.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: bjhunt-docker-proxy
    environment:
      CONTAINERS: 1
      EXEC: 1
      POST: 1
      INFO: 1     # docker version handshake
      AUTH: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EVENTS: 0
      IMAGES: 0
      NETWORKS: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - bjhunt-mgmt
    mem_limit: 64m
    cpus: 0.1
    pids_limit: 32
    # read_only:true was attempted but the tecnativa entrypoint writes
    # haproxy.cfg from a template at startup, and tmpfs over the whole
    # /usr/local/etc/haproxy dir hides the template file. Container is
    # already heavily restricted (64MB RAM, 32 pids, isolated network,
    # only INFO/CONTAINERS/EXEC/POST endpoints).
    security_opt:
      - "no-new-privileges:true"
    tmpfs:
      - /run
    restart: unless-stopped

  # ── Caddy (Reverse Proxy) ─────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: bjhunt-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      backend:
        condition: service_healthy
      langgraph:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.25
    pids_limit: 64
    networks:
      - bjhunt-mgmt
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  workspace_data:
  caddy_data:
  caddy_config:
  caddy_logs:

networks:
  bjhunt-mgmt:
    driver: bridge
  bjhunt-sandbox-net:
    driver: bridge
