# =============================================================================
# LiteLLM Proxy Configuration for BJHUNT ALPHA 1.0
# =============================================================================
# Per docs/architecture/18-LLM-PROVIDERS.md.
#
# Hardened with: fallback chains, monthly budget cap, cooldown_time, prompt
# caching for Anthropic models, langfuse callback (optional), per-model stream.
#
# Docs: https://docs.litellm.ai/docs/proxy/configs

model_list:
  # ── Anthropic ────────────────────────────────────────────────────────
  # cache_control: ephemeral marks the system prompt for Anthropic prompt
  # caching, ~50% token cost reduction on repeated agent invocations.
  - model_name: anthropic/claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
      stream: true
      max_tokens: 8192
      cache_control_injection_points:
        - location: message
          role: system
    model_info:
      input_cost_per_token: 0.000015
      output_cost_per_token: 0.000075
      max_tokens: 8192

  - model_name: anthropic/claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
      stream: true
      max_tokens: 8192
      cache_control_injection_points:
        - location: message
          role: system
    model_info:
      input_cost_per_token: 0.000003
      output_cost_per_token: 0.000015
      max_tokens: 8192

  - model_name: anthropic/claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
      stream: true
      max_tokens: 8192
      cache_control_injection_points:
        - location: message
          role: system
    model_info:
      input_cost_per_token: 0.0000008
      output_cost_per_token: 0.000004
      max_tokens: 8192

  # ── OpenAI ───────────────────────────────────────────────────────────
  - model_name: openai/gpt-5.4
    litellm_params:
      model: openai/gpt-5.4
      api_key: os.environ/OPENAI_API_KEY
      stream: true
      max_tokens: 8192

  - model_name: openai/gpt-4.1
    litellm_params:
      model: openai/gpt-4.1
      api_key: os.environ/OPENAI_API_KEY
      stream: true
      max_tokens: 8192

  # ── Google ───────────────────────────────────────────────────────────
  - model_name: gemini/gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
      stream: true
      max_tokens: 8192

  # ── Ollama Cloud ─────────────────────────────────────────────────────
  # Auth: Bearer token via OLLAMA_CLOUD_API_KEY
  # Base: https://ollama.com/v1 (OpenAI-compatible)
  # 17/18 BJHUNT agents currently default to GLM-5.1 — this is the SPOF the
  # `fallbacks` block below mitigates.

  - model_name: ollama-cloud/glm-5.1
    litellm_params:
      model: openai/glm-5.1:cloud
      api_key: os.environ/OLLAMA_CLOUD_API_KEY
      api_base: https://ollama.com/v1
      stream: true
      max_tokens: 8192

  - model_name: ollama-cloud/deepseek-v3.2
    litellm_params:
      model: openai/deepseek-v3.2:cloud
      api_key: os.environ/OLLAMA_CLOUD_API_KEY
      api_base: https://ollama.com/v1
      stream: true
      max_tokens: 8192

  - model_name: ollama-cloud/kimi-k2.5
    litellm_params:
      model: openai/kimi-k2.5:cloud
      api_key: os.environ/OLLAMA_CLOUD_API_KEY
      api_base: https://ollama.com/v1
      stream: true
      max_tokens: 8192

# --- Router Settings ---
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  timeout: 120
  retry_after: 15
  allowed_fails: 3
  cooldown_time: 60

  # Fallback chains — when the primary provider errors or hits cooldown,
  # LiteLLM transparently retries on the next model in the chain.
  fallbacks:
    - anthropic/claude-opus-4-6:
        - anthropic/claude-sonnet-4-6
        - openai/gpt-5.4
    - anthropic/claude-sonnet-4-6:
        - ollama-cloud/glm-5.1
        - openai/gpt-4.1
    - anthropic/claude-haiku-4-5:
        - gemini/gemini-2.5-flash
        - ollama-cloud/glm-5.1
    - ollama-cloud/glm-5.1:
        - ollama-cloud/deepseek-v3.2
        - openai/gpt-4.1
    - ollama-cloud/deepseek-v3.2:
        - ollama-cloud/glm-5.1
        - openai/gpt-4.1
    - ollama-cloud/kimi-k2.5:
        - ollama-cloud/glm-5.1
        - anthropic/claude-haiku-4-5

  # Context window fallbacks — if a model returns "context_length_exceeded",
  # LiteLLM retries with a model that has a larger window.
  context_window_fallbacks:
    - anthropic/claude-haiku-4-5:
        - anthropic/claude-sonnet-4-6
    - ollama-cloud/glm-5.1:
        - anthropic/claude-sonnet-4-6

# --- Litellm Settings ---
litellm_settings:
  # Track every call to PostgreSQL for spend dashboard (admin/llm page).
  success_callback: ["postgres"]
  failure_callback: ["postgres"]
  # Optional: enable Langfuse for detailed traces (uncomment when LANGFUSE_PUBLIC_KEY/SECRET_KEY set)
  # success_callback: ["postgres", "langfuse"]
  # failure_callback: ["postgres", "langfuse"]

  # Drop unsupported params silently (otherwise certain provider-specific args
  # like `cache_control` reaching OpenAI cause 400 errors).
  drop_params: true

  # Cap request size to mitigate runaway prompts (8 MB).
  max_request_size_mb: 8

  # Default cache TTL when caching is enabled.
  cache: false  # Disable response caching by default — we use Anthropic-side prompt caching only

# --- General Settings ---
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  # Salt for encrypting provider API keys at rest (when set via UI).
  # Set LITELLM_SALT_KEY in .env via openssl rand -hex 32.

  # Per-key controls (set via /key/generate API or admin UI):
  #   max_budget: 500            # USD per budget_duration
  #   budget_duration: "30d"     # rolling 30-day window
  #   tpm_limit: 100000          # tokens/minute
  #   rpm_limit: 100             # requests/minute
  # Enforced through model_max_budget below for guardrails.

  # Hard global cap to prevent surprise bills — per-key budgets refine this.
  max_budget: 500
  budget_duration: "30d"

  # Alerting (opt-in, requires Slack webhook in env).
  # alerting: ["slack"]
  # alert_to_webhook_url: os.environ/SLACK_ALERT_WEBHOOK_URL
