# BJHUNT Observability Stack — Prometheus + Grafana + Loki + Promtail
#
# Per docs/architecture/19-SCALING.md Phase 1 → robustifier (Prometheus +
# Grafana + Loki + Sentry external) and 14-SECURITY.md §Logging.
#
# Run separately from the main app stack (so a Grafana crash never affects
# the API) but on the same Docker network so it can scrape internal endpoints.
#
# Bring up:
#   docker compose -f docker-compose.yml -f ops/observability/docker-compose.observability.yml up -d
#
# RAM budget on KVM 8 (32 GB total):
#   prometheus  ~ 200 MB
#   grafana     ~ 150 MB
#   loki        ~ 200 MB
#   promtail    ~  50 MB
#   ──────────────────────
#   total       ~ 600 MB
#
# Bind only to 127.0.0.1 — access via SSH tunnel:
#   ssh -L 3000:127.0.0.1:3000 bjhunt-vps
# Then http://localhost:3000 in your browser.

services:
  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: bjhunt-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=5GB"
      - "--web.enable-lifecycle"
    volumes:
      - ./ops/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 0.5
    networks:
      - bjhunt-mgmt
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: bjhunt-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/observability/grafana-provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - loki
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 384m
    cpus: 0.5
    networks:
      - bjhunt-mgmt
    restart: unless-stopped

  loki:
    image: grafana/loki:3.3.0
    container_name: bjhunt-loki
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./ops/observability/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 384m
    cpus: 0.5
    networks:
      - bjhunt-mgmt
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.3.0
    container_name: bjhunt-promtail
    command: ["-config.file=/etc/promtail/promtail.yml"]
    volumes:
      - ./ops/observability/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
    depends_on:
      - loki
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 0.25
    networks:
      - bjhunt-mgmt
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
